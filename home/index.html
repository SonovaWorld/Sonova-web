<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>SONOVA — ENTER THE EXPERIENCE</title><meta name="description" content="SONOVA — Official Brand Hub and Digital Storefront 2026. Explore high-contrast design layouts, chaotic cyber aesthetics, and premium curated streetwear collection drops."><meta name="keywords" content="SONOVA, sonovaworld, fashion capsule, premium streetwear, minimalist design, luxury apparel 2026, techwear capsule, cyberpunk style"><meta name="robots" content="index, follow"><meta property="og:title" content="SONOVA — MAIN ECOSYSTEM 2026"><meta property="og:description" content="Step inside the digital retail storefront of SONOVA. Explore high-end design engineering and exclusive apparel modules."><meta property="og:url" content="https://sonovaworld.com/main.html"><meta property="og:type" content="website"><script src="https://cdn.tailwindcss.com"></script><link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;700&family=Syne:wght@800&display=swap" rel="stylesheet"><script>tailwind.config={theme:{extend:{fontFamily:{display:['Syne','sans-serif'],body:['Space Grotesk','sans-serif']}}}}</script><style>body{background:radial-gradient(circle at 50% 50%,#151515 0,#000 100%);color:#fff;font-family:'Space Grotesk',sans-serif;overflow:hidden;margin:0;user-select:none;-webkit-user-select:none}.bg-video{position:fixed;top:0;left:0;width:100%;height:100%;object-fit:cover;z-index:-6;pointer-events:none}.video-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.4);z-index:-5;pointer-events:none}#galaxy-bg{position:fixed;top:0;left:0;width:100vw;height:100vh;z-index:-4;opacity:.85;pointer-events:none}.chrome-text{background:linear-gradient(180deg,#fff 0,#aaa 100%);background-clip:text;-webkit-background-clip:text;-webkit-text-fill-color:transparent;filter:drop-shadow(0 0 15px rgba(255,255,255,.4))}.enter-btn{background:#fff;color:#000;font-weight:700;transition:all .3s ease;position:relative;z-index:20}#crosshair{position:fixed;width:24px;height:24px;pointer-events:none;z-index:9999;mix-blend-mode:difference;transition:transform .15s ease-out;display:none;top:0;left:0}#crosshair::after,#crosshair::before{content:'';position:absolute;background:#fff}#crosshair::before{top:50%;left:0;width:100%;height:1px}#crosshair::after{left:50%;top:0;width:1px;height:100%}@media (min-width:768px){body,a,button{cursor:none!important}#crosshair{display:block}}</style><script>;window.addEventListener('error',function(e){if(e.target.src&&e.target.src.includes('videoData.js')){console.warn("videoData.js not found. Running canvas engine.");}},true);</script><script src="videoData.js" onerror="console.log('videoData failed safely')"></script></head><body class="h-screen flex flex-col items-center justify-center relative"><video id="bgVideo" autoplay muted loop playsinline class="bg-video"></video><div class="video-overlay"></div><canvas id="galaxy-bg"></canvas><div class="fixed top-6 md:top-10 flex justify-between w-full px-6 md:px-10 uppercase tracking-[0.3em] md:tracking-[0.5em] text-[8px] md:text-[10px] opacity-60 z-10"><span>SG // 2026</span><span>PROTOTYPE_S01</span></div><div class="text-center px-6 flex flex-col items-center z-10"><h1 class="font-display font-[800] text-5xl sm:text-7xl md:text-8xl lg:text-9xl chrome-text tracking-tighter leading-tight mb-10 md:mb-12">SONOVA</h1><a href="../shop/" class="enter-btn px-10 md:px-12 py-4 rounded-full uppercase text-[10px] md:text-xs tracking-widest inline-block">Enter Shop</a></div><div id="crosshair"></div><script>try{const v=document.getElementById("bgVideo");if(v&&typeof SONOVA_VIDEO_DATA!=="undefined"){v.src=SONOVA_VIDEO_DATA}}catch(err){}const galaxyCanvas=document.getElementById('galaxy-bg'),gCtx=galaxyCanvas.getContext('2d'),ch=document.getElementById('crosshair');let currentWidth=window.innerWidth,currentHeight=window.innerHeight;function setupCanvases(){currentWidth=window.innerWidth;currentHeight=window.innerHeight;const dpr=window.devicePixelRatio||1;galaxyCanvas.width=currentWidth*dpr;galaxyCanvas.height=currentHeight*dpr;gCtx.setTransform(1,0,0,1,0,0);gCtx.scale(dpr,dpr);gCtx.imageSmoothingEnabled=true}class BackgroundDot{constructor(isTinyAndSlow=false){this.x=Math.random()*currentWidth;this.y=Math.random()*currentHeight;const colors=['#ffffff','#a2d2ff','#e8dbff','#fdf0cd'];this.color=colors[Math.floor(Math.random()*colors.length)];if(isTinyAndSlow){this.size=Math.random()*1+0.5;this.speedX=(Math.random()-0.5)*0.05;this.speedY=(Math.random()-0.5)*0.05}else{this.size=Math.random()*3+1;this.speedX=(Math.random()-0.5)*0.5;this.speedY=(Math.random()-0.5)*0.5}this.twinkleSpeed=Math.random()*0.002+0.003;this.alpha=Math.random()}update(){this.x+=this.speedX;this.y+=this.speedY;if(this.x<0)this.x=currentWidth;if(this.x>currentWidth)this.x=0;if(this.y<0)this.y=currentHeight;if(this.y>currentHeight)this.y=0;this.alpha+=this.twinkleSpeed;if(this.alpha>=1||this.alpha<=0.1){this.twinkleSpeed=-this.twinkleSpeed}}draw(){gCtx.save();gCtx.globalAlpha=Math.max(0.1,Math.min(1,this.alpha));gCtx.shadowBlur=10;gCtx.shadowColor=this.color;gCtx.fillStyle=this.color;gCtx.beginPath();gCtx.arc(this.x,this.y,this.size,0,Math.PI*2);gCtx.fill();gCtx.restore()}}class ImageStar{constructor(){this.x=0;this.y=0;this.size=Math.random()*3+2;this.rotation=Math.random()*Math.PI*2;this.rotationSpeed=0.003;this.alpha=0;this.state="IDLE";this.displayDuration=2000;this.stateTimer=0}spawn(){this.x=Math.random()*(currentWidth-150)+75;this.y=Math.random()*(currentHeight-150)+75;this.state="FADING_IN";this.alpha=0;this.stateTimer=0}update(deltaTime){if(this.state==="IDLE")return;this.stateTimer+=deltaTime;if(this.state==="FADING_IN"){this.alpha+=0.06;this.rotation+=0.04;if(this.alpha>=1){this.alpha=1;this.state="SHINING"}}else if(this.state==="SHINING"){this.rotation+=this.rotationSpeed;if(this.stateTimer>=this.displayDuration-400){this.state="FADING_OUT"}}else if(this.state==="FADING_OUT"){this.alpha-=0.06;this.rotation+=0.04;if(this.alpha<=0){this.alpha=0;this.state="IDLE"}}}draw(){if(this.state==="IDLE")return;gCtx.save();gCtx.globalAlpha=this.alpha;const cx=Math.floor(this.x),cy=Math.floor(this.y),imgSize=Math.floor(this.size*20);if(useLogo){gCtx.translate(cx,cy);gCtx.rotate(this.rotation);gCtx.drawImage(starLogo,-imgSize/2,-imgSize/2,imgSize,imgSize)}else{gCtx.fillStyle="rgba(255,255,255,0.7)";gCtx.beginPath();gCtx.arc(cx,cy,imgSize/4,0,Math.PI*2);gCtx.fill()}gCtx.restore()}}class ShootingStar{constructor(){this.reset();this.active=false}reset(){this.x=Math.random()>0.5?Math.random()*currentWidth*0.7:-50;this.y=this.x===-50?Math.random()*currentHeight*0.5:-50;this.size=Math.random()*2+1.5;this.speed=Math.random()*8+12;this.angle=Math.PI/4+(Math.random()*0.1-0.05);this.dx=Math.cos(this.angle)*this.speed;this.dy=Math.sin(this.angle)*this.speed;this.history=[];this.maxTrailLength=25}launch(){this.reset();this.active=true}update(){if(!this.active)return;this.history.push({x:this.x,y:this.y});if(this.history.length>this.maxTrailLength)this.history.shift();this.x+=this.dx;this.y+=this.dy;if(this.x>currentWidth+100||this.y>currentHeight+100){if(this.history.length>0){this.history.shift()}else{this.active=false}}}draw(){if(!this.active)return;if(this.history.length>1){gCtx.save();for(let i=1;i<this.history.length;i++){const p1=this.history[i-1],p2=this.history[i],alphaPercent=i/this.history.length;gCtx.globalAlpha=alphaPercent*0.4;gCtx.strokeStyle='#ffffff';gCtx.lineWidth=this.size*2*alphaPercent;gCtx.lineCap='round';gCtx.beginPath();gCtx.moveTo(p1.x,p1.y);gCtx.lineTo(p2.x,p2.y);gCtx.stroke()}gCtx.restore()}}}const starLogo=new Image();starLogo.src="star1.png";let useLogo=false;starLogo.onload=function(){useLogo=true};const backgroundDots=[];for(let i=0;i<24;i++)backgroundDots.push(new BackgroundDot(false));for(let i=0;i<60;i++)backgroundDots.push(new BackgroundDot(true));const totalImageStars=[];for(let i=0;i<8;i++)totalImageStars.push(new ImageStar());const globalShootingStar=new ShootingStar();let activeQuadIndices=[0,1,2,3],lastLoopResetTime=0,lastShootingStarTime=0;const spawnTrackers=[false,false,false,false],pureRestDuration=3000,staggerOffsets=[0,2000,5000,10000],totalLoopDuration=pureRestDuration+staggerOffsets[2]+2000;function cycleQuadPools(){activeQuadIndices=activeQuadIndices[0]===0?[4,5,6,7]:[0,1,2,3];spawnTrackers.fill(false)}setupCanvases();window.addEventListener('resize',setupCanvases);let lastTime=0;function animate(currentTime){if(!lastTime)lastTime=currentTime;const deltaTime=currentTime-lastTime;lastTime=currentTime;gCtx.clearRect(0,0,currentWidth,currentHeight);backgroundDots.forEach(dot=>{dot.update();dot.draw()});if(currentTime-lastShootingStarTime>=10000){globalShootingStar.launch();lastShootingStarTime=currentTime}globalShootingStar.update();globalShootingStar.draw();const timeInCurrentLoop=currentTime-lastLoopResetTime;if(timeInCurrentLoop>=pureRestDuration){const activeActionTime=timeInCurrentLoop-pureRestDuration;for(let i=0;i<4;i++){if(activeActionTime>=staggerOffsets[i]&&!spawnTrackers[i]){totalImageStars[activeQuadIndices[i]].spawn();spawnTrackers[i]=true}}}if(timeInCurrentLoop>=totalLoopDuration){cycleQuadPools();lastLoopResetTime=currentTime}totalImageStars.forEach(star=>{star.update(deltaTime);star.draw()});requestAnimationFrame(animate)}requestAnimationFrame(animate);window.addEventListener('mousemove',(e)=>{ch.style.left=(e.clientX-12)+'px';ch.style.top=(e.clientY-12)+'px';const t=document.elementFromPoint(e.clientX,e.clientY);if(t&&t.closest('a, button')){ch.style.transform='scale(1.8) rotate(45deg)'}else{ch.style.transform='scale(1) rotate(0deg)'}});document.addEventListener('contextmenu',event=>event.preventDefault());</script></body></html>
