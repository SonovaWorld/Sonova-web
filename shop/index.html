th.random()*3+1;this.speedX=(Math.random()-0.5)*0.5;this.speedY=(Math.random()-0.5)*0.5}this.twinkleSpeed=Math.random()*0.002+0.003;this.alpha=Math.random()}update(){this.x+=this.speedX;this.y+=this.speedY;if(this.x<0)this.x=currentWidth;if(this.x>currentWidth)this.x=0;if(this.y<0)this.y=currentHeight;if(this.y>currentHeight)this.y=0;this.alpha+=this.twinkleSpeed;if(this.alpha>=1||this.alpha<=0.1){this.twinkleSpeed=-this.twinkleSpeed}}draw(){ctx.save();ctx.globalAlpha=Math.max(0.1,Math.min(1,this.alpha));ctx.shadowBlur=10;ctx.shadowColor=this.color;ctx.fillStyle=this.color;ctx.beginPath();ctx.arc(this.x,this.y,this.size,0,Math.PI*2);ctx.fill();ctx.restore()}}class ImageStar{constructor(){this.x=0;this.y=0;this.size=Math.random()*3+2;this.rotation=Math.random()*Math.PI*2;this.rotationSpeed=0.003;this.alpha=0;this.state="IDLE";this.displayDuration=2000;this.stateTimer=0}spawn(){this.x=Math.random()*(currentWidth-150)+75;this.y=Math.random()*(currentHeight-150)+75;this.state="FADING_IN";this.alpha=0;this.stateTimer=0}update(e){if(this.state==="IDLE")return;this.stateTimer+=e;if(this.state==="FADING_IN"){this.alpha+=0.06;this.rotation+=0.04;if(this.alpha>=1){this.alpha=1;this.state="SHINING"}}else if(this.state==="SHINING"){this.rotation+=this.rotationSpeed;if(this.stateTimer>=this.displayDuration-400){this.state="FADING_OUT"}}else if(this.state==="FADING_OUT"){this.alpha-=0.06;this.rotation+=0.04;if(this.alpha<=0){this.alpha=0;this.state="IDLE"}}}draw(){if(!useLogo||this.state==="IDLE")return;ctx.save();ctx.globalAlpha=this.alpha;const e=Math.floor(this.x),t=Math.floor(this.y),a=Math.floor(this.size*20);ctx.translate(e,t);ctx.rotate(this.rotation);ctx.drawImage(starLogo,-a/2,-a/2,a,a);ctx.restore()}}class ShootingStar{constructor(){this.reset();this.active=false}reset(){if(Math.random()>0.5){this.x=Math.random()*currentWidth*0.7;this.y=-50}else{this.x=-50;this.y=Math.random()*currentHeight*0.5}this.size=Math.random()*2+1.5;this.speed=Math.random()*8+12;this.angle=Math.PI/4+(Math.random()*0.1-0.05);this.dx=Math.cos(this.angle)*this.speed;this.dy=Math.sin(this.angle)*this.speed;this.history=[];this.maxTrailLength=25}launch(){this.reset();this.active=true}update(){if(!this.active)return;this.history.push({x:this.x,y:this.y});if(this.history.length>this.maxTrailLength){this.history.shift()}this.x+=this.dx;this.y+=this.dy;if(this.x>currentWidth+100||this.y>currentHeight+100){if(this.history.length>0){this.history.shift()}else{this.active=false}}}draw(){if(!this.active||!useLogo)return;if(this.history.length>1){ctx.save();for(let e=1;e<this.history.length;e++){const t=this.history[e-1],a=this.history[e],s=e/this.history.length;ctx.globalAlpha=s*0.4;ctx.strokeStyle='#ffffff';ctx.lineWidth=this.size*2*s;ctx.lineCap='round';ctx.beginPath();ctx.moveTo(t.x,t.y);ctx.lineTo(a.x,a.y);ctx.stroke()}ctx.restore()}ctx.save();ctx.globalAlpha=0.9;const e=Math.floor(this.size*15);ctx.translate(Math.floor(this.x),Math.floor(this.y));ctx.rotate(this.angle);ctx.drawImage(starLogo,-e/2,-e/2,e,e);ctx.restore()}}const backgroundDots=[];for(let i=0;i<24;i++)backgroundDots.push(new BackgroundDot(false));for(let i=0;i<60;i++)backgroundDots.push(new BackgroundDot(true));const totalImageStars=[];for(let i=0;i<8;i++)totalImageStars.push(new ImageStar());const globalShootingStar=new ShootingStar();let activeQuadIndices=[0,1,2,3],lastLoopResetTime=0,lastShootingStarTime=0;const spawnTrackers=[false,false,false,false],pureRestDuration=3000,staggerOffsets=[0,2000,5000,10000],totalLoopDuration=pureRestDuration+staggerOffsets[2]+2000;function cycleQuadPools(){activeQuadIndices=activeQuadIndices[0]===0?[4,5,6,7]:[0,1,2,3];spawnTrackers.fill(false)}let lastTime=0;function animate(e){if(!lastTime)lastTime=e;const t=e-lastTime;lastTime=e;ctx.clearRect(0,0,currentWidth,currentHeight);backgroundDots.forEach(e=>{e.update();e.draw()});if(e-lastShootingStarTime>=10000){globalShootingStar.launch();lastShootingStarTime=e}globalShootingStar.update();globalShootingStar.draw();const a=e-lastLoopResetTime;if(a>=pureRestDuration){const s=a-pureRestDuration;for(let e=0;e<4;e++){if(s>=staggerOffsets[e]&&!spawnTrackers[e]){const t=activeQuadIndices[e];totalImageStars[t].spawn();spawnTrackers[e]=true}}}if(a>=totalLoopDuration){cycleQuadPools();lastLoopResetTime=e}totalImageStars.forEach(e=>{e.update(t);e.draw()});requestAnimationFrame(animate)}window.addEventListener('mousemove',(e)=>{ch.style.left=(e.clientX-10)+'px';ch.style.top=(e.clientY-10)+'px';const t=e.target.closest('a, button');ch.style.transform=t?'scale(2) rotate(45deg)':'scale(1) rotate(0deg)'});requestAnimationFrame(animate);document.addEventListener('contextmenu',e=>e.preventDefault());</script></body></html>
