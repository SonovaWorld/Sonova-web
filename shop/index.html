white hover:text-black transition-all uppercase tracking-widest">Buy</a></div></div><div class="product-card p-4"><div class="aspect-[3/4] overflow-hidden bg-zinc-900"><img src="https://images.unsplash.com/photo-1588850561407-ed78c282e89b?w=800" class="product-image w-full h-full object-cover"></div><div class="mt-8 flex justify-between items-end px-2"><div><h3 class="uppercase font-bold tracking-widest text-lg">Nylon Cap</h3><p class="price-tag text-xs mt-1">S$35.00</p></div><a href="#" class="text-[10px] font-bold border border-white/20 px-6 py-2 hover:bg-white hover:text-black transition-all uppercase tracking-widest">Buy</a></div></div></main><div id="crosshair"></div><script>;(function(){const canvas=document.getElementById('pixelCanvas'),ctx=canvas.getContext('2d'),ch=document.getElementById('crosshair');let embers=[];const isMobile=window.innerWidth<768,emberCount=isMobile?100:350;class LuxuryEmber{constructor(){this.init(!0)}init(t=!1){this.x=Math.random()*canvas.width,this.y=t?Math.random()*canvas.height:canvas.height+20,this.size=Math.random()*3+1,this.vy=-Math.random()*1.5-.5,this.vx=(Math.random()-.5)*.8,this.life=1,this.decay=Math.random()*.005+.002,this.color=Math.random()>.5?"255, 248, 240":"210, 210, 210"}update(){this.y+=this.vy,this.x+=this.vx,this.life-=this.decay,(this.life<=0||this.y<-20)&&this.init(!1)}draw(){const t=Math.random()*.2;ctx.fillStyle=`rgba(${this.color}, ${Math.max(0,this.life-t)})`,ctx.fillRect(this.x,this.y,this.size,this.size)}}function setup(){canvas.width=window.innerWidth,canvas.height=window.innerHeight,embers=Array.from({length:emberCount},()=>new LuxuryEmber())}function animate(){ctx.clearRect(0,0,canvas.width,canvas.height),embers.forEach(t=>{t.update(),t.draw()}),requestAnimationFrame(animate)}window.addEventListener('mousemove',t=>{ch.style.left=(t.clientX-10)+'px',ch.style.top=(t.clientY-10)+'px';const e=t.target.closest('a, button');ch.style.transform=e?'scale(2) rotate(45deg)':'scale(1) rotate(0deg)'}),window.addEventListener('resize',setup),setup(),animate(),document.addEventListener('contextmenu',t=>t.preventDefault());})();</script></body></html>
