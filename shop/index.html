<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Products — SONOVA</title><meta name="description" content="Explore SONOVA Collection 01. Premium minimalist streetwear featuring the Chrome Tee, Ind Hoodie, and Nylon Cap. High-end textiles engineered for 2026."><meta name="keywords" content="SONOVA catalog, premium streetwear, Chrome Tee, Ind Hoodie, luxury apparel Singapore, designer fashion 2026"><meta name="robots" content="index, follow"><meta property="og:title" content="SONOVA — COLLECTION 01"><meta property="og:description" content="Shop exclusive luxury staples from the official SONOVA retail environment."><meta property="og:url" content="https://sonovaworld.com/products.html"><meta property="og:type" content="website"><script src="https://cdn.tailwindcss.com"></script><link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;700&display=swap" rel="stylesheet"><style>body{background:radial-gradient(circle at 50% 50%,#151515 0%,#000 100%);color:#fff;font-family:'Space Grotesk',sans-serif;margin:0;overflow-x:hidden;user-select:none;-webkit-user-select:none}img{pointer-events:none;-webkit-user-drag:none}#galaxy-bg{position:fixed;top:0;left:0;width:100vw;height:100vh;z-index:-1;opacity:.85;pointer-events:none}nav{position:fixed;top:0;left:0;width:100%;padding:2rem;display:flex;justify-content:space-between;align-items:center;z-index:50}.product-card{background:rgba(255,255,255,.02);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.05);transition:all .5s cubic-bezier(.2,1,.3,1)}@media (min-width:768px){.product-card:hover{background:rgba(255,255,255,.05);border-color:rgba(255,255,255,.3);transform:translateY(-4px);box-shadow:0 15px 30px rgba(0,0,0,.4)}}.product-image{filter:grayscale(.5) brightness(.8);transition:.8s cubic-bezier(.2,1,.3,1)}.product-card:hover .product-image{filter:grayscale(0) brightness(1);transform:scale(1.03)}#crosshair{position:fixed;width:20px;height:20px;pointer-events:none;z-index:9999;mix-blend-mode:difference;transition:transform .2s ease-out;display:none;top:0;left:0}#crosshair::before{content:'';position:absolute;top:50%;left:0;width:100%;height:1px;background:#fff}#crosshair::after{content:'';position:absolute;left:50%;top:0;width:1px;height:100%;background:#fff}@media (min-width:768px){body,a,button{cursor:none!important}#crosshair{display:block}}.price-tag{font-weight:300;letter-spacing:.1em;opacity:.5}</style><script src="videoData.js"></script></head><body><canvas id="galaxy-bg"></canvas><nav><a href="../home/" class="nav-logo font-bold tracking-tighter text-2xl uppercase">SONOVA</a><div class="text-[10px] tracking-[0.6em] uppercase font-bold opacity-40">Collection // 01</div></nav><main class="relative z-10 max-w-5xl mx-auto grid grid-cols-2 md:grid-cols-3 gap-3 md:gap-6 pt-44 pb-24 px-4 md:px-8"><div class="product-card p-2 md:p-3"><div class="aspect-[3/4] overflow-hidden bg-zinc-900"><img src="https://images.unsplash.com/photo-1521572267360-ee0c2909d518?w=800" class="product-image w-full h-full object-cover"></div><div class="mt-3 md:mt-6 flex flex-col sm:flex-row justify-between items-start sm:items-end gap-2 px-1"><div><h3 class="uppercase font-bold tracking-widest text-xs md:text-base">Chrome Tee</h3><p class="price-tag text-[9px] md:text-xs mt-1">S$45.00</p></div><a href="#" class="w-full sm:w-auto text-center text-[9px] font-bold border border-white/20 px-3 md:px-4 py-1.5 hover:bg-white hover:text-black transition-all uppercase tracking-widest">Buy</a></div></div><div class="product-card p-2 md:p-3"><div class="aspect-[3/4] overflow-hidden bg-zinc-900"><img src="https://images.unsplash.com/photo-1556821840-3a63f95609a7?w=800" class="product-image w-full h-full object-cover"></div><div class="mt-3 md:mt-6 flex flex-col sm:flex-row justify-between items-start sm:items-end gap-2 px-1"><div><h3 class="uppercase font-bold tracking-widest text-xs md:text-base">Ind Hoodie</h3><p class="price-tag text-[9px] md:text-xs mt-1">S$85.00</p></div><a href="#" class="w-full sm:w-auto text-center text-[9px] font-bold border border-white/20 px-3 md:px-4 py-1.5 hover:bg-white hover:text-black transition-all uppercase tracking-widest">Buy</a></div></div><div class="product-card p-2 md:p-3"><div class="aspect-[3/4] overflow-hidden bg-zinc-900"><img src="https://images.unsplash.com/photo-1588850561407-ed78c282e89b?w=800" class="product-image w-full h-full object-cover"></div><div class="mt-3 md:mt-6 flex flex-col sm:flex-row justify-between items-start sm:items-end gap-2 px-1"><div><h3 class="uppercase font-bold tracking-widest text-xs md:text-base">Nylon Cap</h3><p class="price-tag text-[9px] md:text-xs mt-1">S$35.00</p></div><a href="#" class="w-full sm:w-auto text-center text-[9px] font-bold border border-white/20 px-3 md:px-4 py-1.5 hover:bg-white hover:text-black transition-all uppercase tracking-widest">Buy</a></div></div></main><div id="crosshair"></div><script>const canvas=document.getElementById("galaxy-bg"),ctx=canvas.getContext("2d"),ch=document.getElementById("crosshair");function resizeCanvas(){canvas.width=window.innerWidth;canvas.height=window.innerHeight}window.addEventListener("resize",resizeCanvas);resizeCanvas();const starLogo=new Image();starLogo.src="star1.png";let useLogo=!1;starLogo.onload=function(){useLogo=!0};class Star{constructor(){this.x=Math.random()*canvas.width;this.y=Math.random()*canvas.height;this.size=3*Math.random()+1;this.speedX=.5*(Math.random()-.5);this.speedY=.5*(Math.random()-.5);this.alpha=Math.random();this.twinkleSpeed=.001*Math.random()+.005}update(){this.x+=this.speedX;this.y+=this.speedY;if(this.x<0)this.x=canvas.width;if(this.x>canvas.width)this.x=0;if(this.y<0)this.y=canvas.height;if(this.y>canvas.height)this.y=0;this.alpha+=this.twinkleSpeed;if(this.alpha>1||this.alpha<0)this.twinkleSpeed=-this.twinkleSpeed}draw(){ctx.save();ctx.globalAlpha=this.alpha;if(useLogo){ctx.drawImage(starLogo,this.x-16*this.size,this.y-16*this.size,32*this.size,32*this.size)}else{ctx.shadowBlur=10;ctx.shadowColor="#ffffff";ctx.fillStyle="#ffffff";ctx.beginPath();ctx.arc(this.x,this.y,this.size,0,2*Math.PI);ctx.fill()}ctx.restore()}}const starArray=[],numberOfStars=30;for(let e=0;e<numberOfStars;e++){const t=new Star();t.x=Math.random()*canvas.width;t.y=Math.random()*canvas.height;starArray.push(t)}function animate(){ctx.clearRect(0,0,canvas.width,canvas.height);starArray.forEach(e=>{e.update();e.draw()});requestAnimationFrame(animate)}window.addEventListener("mousemove",e=>{if(ch){ch.style.left=(e.clientX-10)+"px";ch.style.top=(e.clientY-10)+"px";const t=e.target.closest("a, button");ch.style.transform=t?"scale(2) rotate(45deg)":"scale(1) rotate(0deg)"}});animate();document.addEventListener("contextmenu",e=>e.preventDefault());</script></body></html>
