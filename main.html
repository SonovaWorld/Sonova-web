<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>SONOVA — 2026</title><script src="https://cdn.tailwindcss.com"></script><link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;700&family=Syne:wght@800&display=swap" rel="stylesheet"><script>tailwind.config={theme:{extend:{fontFamily:{display:["Syne","sans-serif"],body:["Space Grotesk","sans-serif"]}}}}</script><style>body{background:#000;color:#fff;font-family:'Space Grotesk',sans-serif;overflow:hidden;margin:0;user-select:none;-webkit-user-select:none}.bg-video{position:fixed;top:0;left:0;width:100%;height:100%;object-fit:cover;z-index:-5;pointer-events:none}.video-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.4);z-index:-4;pointer-events:none}#pixelCanvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:-3;pointer-events:none;filter:drop-shadow(0 0 5px rgba(0,150,255,.6))}.chrome-text{background:linear-gradient(180deg,#fff 0%,#aaa 100%);background-clip:text;-webkit-background-clip:text;-webkit-text-fill-color:transparent;filter:drop-shadow(0 0 15px rgba(255,255,255,.4))}.enter-btn{background:#fff;color:#000;font-weight:700;transition:all .3s ease;position:relative;z-index:20}#crosshair{position:fixed;width:24px;height:24px;pointer-events:none;z-index:9999;mix-blend-mode:difference;transition:transform .15s ease-out;display:none;top:0;left:0}#crosshair::after,#crosshair::before{content:'';position:absolute;background:#fff}#crosshair::before{top:50%;left:0;width:100%;height:1px}#crosshair::after{left:50%;top:0;width:1px;height:100%}@media (min-width:768px){body,a,button{cursor:none!important}#crosshair{display:block}}</style><script src="../videoData.js"></script></head><body class="h-screen flex flex-col items-center justify-center relative"><video id="bgVideo" autoplay muted loop playsinline class="bg-video"></video><div class="video-overlay"></div><canvas id="pixelCanvas"></canvas><div class="fixed top-6 md:top-10 flex justify-between w-full px-6 md:px-10 uppercase tracking-[0.3em] md:tracking-[0.5em] text-[8px] md:text-[10px] opacity-60 z-10"><span>SG // 2026</span><span>PROTOTYPE_S01</span></div><div class="text-center px-6 flex flex-col items-center z-10"><h1 class="font-display font-[800] text-5xl sm:text-7xl md:text-8xl lg:text-9xl chrome-text tracking-tighter leading-tight mb-10 md:mb-12">SONOVA</h1><a href="products.html" class="enter-btn px-10 md:px-12 py-4 rounded-full uppercase text-[10px] md:text-xs tracking-widest inline-block">Enter Shop</a></div><div id="crosshair"></div><script>;document.getElementById("bgVideo").src=SONOVA_VIDEO_DATA;const canvas=document.getElementById("pixelCanvas"),ctx=canvas.getContext("2d"),ch=document.getElementById("crosshair");let embers=[];const isMobile=window.innerWidth<768,emberCount=isMobile?150:450;class LoudEmber{constructor(){this.init(!0)}init(t=!1){this.x=Math.random()*canvas.width,this.y=t?Math.random()*canvas.height:canvas.height+20,this.size=4*Math.random()+1.5,this.vy=-4*Math.random()-1,this.vx=3*(Math.random()-.5),this.life=1,this.decay=.01*Math.random()+.003,this.color=Math.random()>.7?"255, 255, 255":"0, 180, 255"}update(){this.y+=this.vy,this.x+=this.vx,this.life-=this.decay,(this.life<=0||this.y<-20)&&this.init(!1)}draw(){const t=.3*Math.random();ctx.fillStyle=`rgba(${this.color}, ${Math.max(0,this.life-t)})`,ctx.fillRect(this.x,this.y,this.size,this.size)}}function init(){embers=[];for(let t=0;t<emberCount;t++)embers.push(new LoudEmber)}function resize(){canvas.width=window.innerWidth,canvas.height=window.innerHeight,init()}function animate(){ctx.clearRect(0,0,canvas.width,canvas.height),embers.forEach(t=>{t.update(),t.draw()}),requestAnimationFrame(animate)}resize(),animate(),window.addEventListener("resize",resize),window.addEventListener("mousemove",t=>{ch.style.left=t.clientX+"px",ch.style.top=t.clientY+"px";const e=document.elementFromPoint(t.clientX,t.clientY);e&&e.closest("a, button")?ch.style.transform="translate(-50%, -50%) scale(1.8) rotate(45deg)":ch.style.transform="translate(-50%, -50%) scale(1) rotate(0deg)"}),document.addEventListener("contextmenu",t=>t.preventDefault());</script></body></html>
